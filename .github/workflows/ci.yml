name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # A green run takes 1-3 minutes. On 2026-07-23 a windows-2022 leg HUNG in the Test step
    # for 46 minutes before the run ended; the same commit passed on rerun, so it was a
    # nondeterministic child-process hang, not a failing assertion. Without a bound, GitHub's
    # 360-minute default applies, so one hang burns six hours of runner time and leaves the
    # matrix looking merely "slow" rather than stuck. 20 minutes is far above the worst
    # observed honest run and far below the point where a hang costs anything.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 (VS2022), not windows-latest: the latest image ships
        # Visual Studio 18, which node-gyp 10 can't detect ("unknown version"),
        # breaking the better-sqlite3 native build when no prebuilt binary is fetched.
        os: [ubuntu-latest, macos-latest, windows-2022]
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      # Build BEFORE test, matching package.json's own prepublishOnly
      # ("npm run build && npm test"). Tests that install this package into a
      # temp project (test/mcp-stdio.test.ts) pack it per the "files" list,
      # which is dist-only — with no dist/ the packed bin target is missing and
      # the MCP child exits instantly ("Connection closed").
      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: CLI smoke (unix)
        if: matrix.os != 'windows-2022'
        run: node dist/bin/inspect.js --metrics

      # On Windows we just verify the binary exists; full TTY testing needs
      # a real Windows runner or WSL.
      - name: CLI binary present (windows)
        if: matrix.os == 'windows-2022'
        run: if (Test-Path dist/bin/inspect.js) { Write-Host "OK" } else { Write-Error "missing" }