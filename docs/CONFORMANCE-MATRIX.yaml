# Slice 3B Conformance Matrix — MCP Configuration Renderers

This matrix records the evidence level for each renderer and direction. It is the
authoritative source for what has been proven vs. documented vs. deferred.

Statuses (from COMPATIBILITY.md):
- documented
- static-config-verified
- process-handshake-verified
- semantic-tool-verified
- runtime-launch-verified
- recovery-verified
- unsupported/unverified

